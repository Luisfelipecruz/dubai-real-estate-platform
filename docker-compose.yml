services:
  # ── Storage Layer ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: dubai_re
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5
    networks:
      - platform

  # ── API Layer ──────────────────────────────────────────────
  api:
    build: ./infra/api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres/dubai_re
    volumes:
      - ./api:/app
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 3
    networks:
      - platform

  # ── Frontend Layer ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - platform

  # ── Development Utilities (profile: tools) ─────────────────
  seed:
    build: ./infra/api
    profiles: ["tools"]
    command: python /app/scripts/ingest.py /app/raw_source/
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/dubai_re
    volumes:
      - ./scripts:/app/scripts
      - ./raw_source:/app/raw_source:ro
    networks:
      - platform

  test:
    build: ./infra/api
    profiles: ["tools"]
    command: python -m pytest /app/tests -v
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres/dubai_re
    volumes:
      - ./api:/app
      - ./scripts:/app/scripts
    networks:
      - platform

volumes:
  postgres_data:

networks:
  platform:
    driver: bridge
