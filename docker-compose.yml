services:
  # ── Storage Layer ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: dubai_re
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/00-create-airflow-db.sql:/docker-entrypoint-initdb.d/00-create-airflow-db.sql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d dubai_re"]
      interval: 5s
      retries: 5
    networks:
      - platform

  # ── API Layer ──────────────────────────────────────────────
  api:
    build: ./infra/api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres/dubai_re
    volumes:
      - ./api:/app
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 3
    networks:
      - platform

  # ── Frontend Layer ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    networks:
      - platform

  # ── Orchestration Layer ───────────────────────────────────
  airflow:
    build: ./infra/airflow
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/airflow_metadata
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      DUBAI_RE_DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/dubai_re
      JDBC_URL: jdbc:postgresql://postgres:5432/dubai_re
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark/jobs:/opt/spark/jobs:ro
      - pipeline_data:/opt/pipeline_data
    ports:
      - "8080:8080"
    entrypoint: ["/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - platform

  # ── Processing Layer ─────────────────────────────────────
  spark-master:
    build: ./infra/spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    env_file: .env
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      JDBC_URL: jdbc:postgresql://postgres:5432/dubai_re
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - pipeline_data:/opt/pipeline_data
    ports:
      - "8081:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - platform

  spark-worker:
    build: ./infra/spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    env_file: .env
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: "2"
      JDBC_URL: jdbc:postgresql://postgres:5432/dubai_re
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - pipeline_data:/opt/pipeline_data
    networks:
      - platform

  # ── Development Utilities (profile: tools) ─────────────────
  seed:
    build: ./infra/api
    profiles: ["tools"]
    command: python /app/scripts/ingest.py /app/raw_source/
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/dubai_re
    volumes:
      - ./scripts:/app/scripts
      - ./raw_source:/app/raw_source:ro
    networks:
      - platform

  test:
    build: ./infra/api
    profiles: ["tools"]
    command: python -m pytest /app/tests -v
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres/dubai_re
    volumes:
      - ./api:/app
      - ./scripts:/app/scripts
    networks:
      - platform

  spark-test:
    build: ./infra/spark
    profiles: ["tools"]
    entrypoint: ["python3", "-m", "pytest"]
    command: ["/opt/spark/tests", "-v"]
    environment:
      PYSPARK_PYTHON: python3
      PYTHONPATH: /opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ./spark/tests:/opt/spark/tests:ro
    networks:
      - platform

volumes:
  postgres_data:
  pipeline_data:

networks:
  platform:
    driver: bridge
